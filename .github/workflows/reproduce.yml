name: reproduce

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install -r requirements.txt
      - name: Regenerate result tables and figures
        run: make reproduce
      - name: Smoke test key output
        run: make test
      - name: Upload regenerated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-results-and-figures
          path: |
            results/
            paper/figures/*.png
